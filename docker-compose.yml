version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dp_user
      POSTGRES_PASSWORD: dp_password
      POSTGRES_DB: digitalized_plantation
    ports:
      - '5432:5432'
    volumes:
      - dp_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - dp_redis_data:/data

volumes:
  dp_postgres_data:
  dp_redis_data:
